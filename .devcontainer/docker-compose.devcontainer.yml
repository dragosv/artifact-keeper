# Devcontainer override for the backend service.
#
# Replaces the cargo-watch hot-reload entrypoint with a persistent shell so
# VS Code can attach and the developer can run cargo commands manually inside
# the container (e.g. `cargo run`, `cargo watch`, `cargo test`).
#
# Also overrides the web service to use the pre-built image from GHCR, because
# the web source lives in a separate repository (artifact-keeper-web) that is
# not required for backend development.
services:
  backend:
    entrypoint: /bin/sh
    command: ["-c", "sleep infinity"]

  web:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile.web
    volumes: !override
      - dev_web_node_modules:/app/node_modules
